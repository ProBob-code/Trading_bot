version: '3.8'

services:
  # Local MySQL Database
  mysql:
    image: mysql:8.0
    container_name: trading-bot-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=trading_bot
      - MYSQL_ROOT_PASSWORD=probobindb
      - MYSQL_USER=probobindb
      - MYSQL_PASSWORD=probobindb
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-local.cnf:/etc/mysql/conf.d/local.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pprobobindb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Trading Bot Backend
  godbot-trading-bot:
    build: .
    container_name: trading-bot
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5050:5050"
    volumes:
      - ./bot_configs.json:/app/bot_configs.json
      - ./trading_bot.log:/app/trading_bot.log
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=probobindb
      - DB_PASSWORD=probobindb
      - DB_NAME=trading_bot

volumes:
  mysql_data:
